name: Feature request
description: Suggest an idea or enhancement for Gargoyle
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea? Great. For open-ended brainstorming consider [Discussions](https://github.com/ispyisail/gargoyle/discussions); use this form when you have a concrete proposal.
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do that Gargoyle doesn't currently support?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see happen?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or other approaches you've thought about.
    validations:
      required: false
